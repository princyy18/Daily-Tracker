<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#6c3dc7">
  <title>🙏 Daily Tracker</title>
  <style>
    /* Reset and Base */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #f5f0ff 0%, #ffe8f0 100%);
      min-height: 100vh;
      color: #2d1b4e;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    /* Prevent zoom on input focus */
    input[type="number"] { font-size: 16px !important; }

    /* Header */
    .header {
      background: linear-gradient(135deg, #6c3dc7, #a855a0);
      color: white;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 3px 12px rgba(108,61,199,.35);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .header h1 { font-size: 18px; font-weight: 700; }
    .header .subtitle { font-size: 11px; opacity: .82; margin-top: 2px; }
    
    .history-btn {
      background: rgba(255,255,255,.22);
      border: none;
      color: white;
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 600;
      transition: background .2s;
      -webkit-tap-highlight-color: transparent;
      min-height: 44px;
    }
    .history-btn:active { background: rgba(255,255,255,.34); }

    /* Date Strip */
    .date-strip {
      background: white;
      margin: 14px 16px 4px;
      border-radius: 12px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }
    .date-strip .label { font-size: 12px; color: #888; }
    .date-strip .date-val { font-size: 15px; font-weight: 700; color: #6c3dc7; }

    /* Field Cards */
    .fields-container { padding: 8px 16px; }

    .field-card {
      background: white;
      border-radius: 16px;
      margin-bottom: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,.07);
      overflow: hidden;
      border-top: 4px solid var(--accent);
    }

    .field-header {
      padding: 12px 16px 6px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .field-name { font-size: 16px; font-weight: 700; color: var(--accent); }

    .field-body { padding: 8px 16px 12px; }

    .input-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }
    
    .input-row input {
      flex: 1;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 18px;
      font-weight: 700;
      color: #1a1a2e;
      outline: none;
      transition: border-color .2s;
      text-align: center;
      -webkit-appearance: none;
      -moz-appearance: textfield;
    }
    
    .input-row input::-webkit-outer-spin-button,
    .input-row input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    
    .input-row input:focus { border-color: var(--accent); }
    
    .add-btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      min-height: 44px;
    }
    .add-btn:active { transform: scale(.96); opacity: .85; }

    /* Totals Section */
    .totals-section {
      margin: 6px 16px 24px;
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,.07);
    }
    
    .totals-title {
      background: linear-gradient(135deg, #6c3dc7, #a855a0);
      color: white;
      text-align: center;
      padding: 10px;
      font-weight: 700;
      font-size: 15px;
    }
    
    .totals-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: #f0f0f0;
    }
    
    .total-item {
      background: white;
      padding: 14px 10px;
      text-align: center;
    }
    .total-item .t-name { font-size: 11px; color: #777; margin-bottom: 4px; line-height: 1.3; }
    .total-item .t-val { font-size: 28px; font-weight: 800; }

    /* History Overlay */
    #history-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: #f5f0ff;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    #history-overlay.open { display: block; }

    .hist-header {
      background: linear-gradient(135deg, #6c3dc7, #a855a0);
      color: white;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 3px 12px rgba(108,61,199,.35);
    }
    .hist-header h2 { font-size: 18px; font-weight: 700; }
    
    .back-btn {
      background: rgba(255,255,255,.22);
      border: none;
      color: white;
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      min-height: 44px;
    }

    .hist-content { padding: 14px 16px; }

    /* Date Groups */
    .date-group {
      background: white;
      border-radius: 14px;
      margin-bottom: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
      overflow: hidden;
    }
    
    .date-group-header {
      background: linear-gradient(90deg, #6c3dc7, #a855a0);
      color: white;
      padding: 12px 16px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      -webkit-tap-highlight-color: transparent;
      min-height: 44px;
    }

    .field-section {
      border-bottom: 1px solid #f0eeff;
      padding: 10px 16px;
    }
    .field-section:last-child { border-bottom: none; }
    
    .field-sec-header {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .entry-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 12px;
      background: #f8f6ff;
      border-radius: 8px;
      margin-bottom: 5px;
    }
    .entry-item .e-time { font-size: 11px; color: #999; }
    .entry-item .e-num { font-size: 18px; font-weight: 800; }

    .day-field-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 12px;
      background: #ede9ff;
      border-radius: 8px;
      margin-top: 5px;
    }
    .day-field-total .dt-label { font-size: 12px; color: #6c3dc7; font-weight: 700; }
    .day-field-total .dt-val { font-size: 20px; font-weight: 900; }

    .empty-msg {
      text-align: center;
      color: #aaa;
      padding: 40px 20px;
      font-size: 14px;
    }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a2e;
      color: white;
      padding: 10px 22px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      opacity: 0;
      transition: opacity .3s;
      pointer-events: none;
      z-index: 999;
      white-space: nowrap;
      max-width: 90vw;
    }
    #toast.show { opacity: 1; }

    /* Mobile Optimizations */
    @media (max-width: 480px) {
      .header { padding: 12px 16px; }
      .header h1 { font-size: 16px; }
      .total-item .t-val { font-size: 24px; }
      .field-name { font-size: 15px; }
    }

    @media (orientation: landscape) and (max-height: 600px) {
      .header { padding: 8px 20px; }
      .date-strip { margin: 8px 16px 4px; }
      .fields-container { padding: 4px 16px; }
      .field-card { margin-bottom: 8px; }
    }
  </style>
</head>

<div id="main-page">
  <div class="header">
    <div>
      <div style="font-size:18px;font-weight:700;">🙏 Daily Tracker</div>
      <div style="font-size:11px;opacity:.82;margin-top:2px;">Daily Spiritual Count</div>
    </div>
    <button class="history-btn" onclick="openHistory()">📋 History</button>

  <div class="date-strip">
    <div class="label">Today's Date</div>

  <div class="fields-container" id="fields-container"></div>

  <div class="hist-content" id="hist-content"></div>
</div>

<script>

// ====== DATA & FIELDS ======
const FIELDS = [
  { id: 'archavatar-stotra', name: 'આર્ચાવતાર સ્તોત્ર', color: '#6c3dc7', icon: '📜' },
  { id: 'vandu-path', name: 'વંદુ પાઠ', color: '#a855a0', icon: '📖' },
  { id: 'janmangal-path', name: 'જનમંગલ પાઠ', color: '#388e3c', icon: '📿' },
  { id: 'namjap', name: 'નામજાપ', color: '#1976d2', icon: '🔱' }
];

function todayStr() {
  const d = new Date();
  return d.toISOString().slice(0, 10);
}
function nowTime() {
  const d = new Date();
  return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
}
function formatDate(str) {
  const d = new Date(str);
  return d.toLocaleDateString('en-US', { day: 'numeric', month: 'long', year: 'numeric' });
}

function loadData() {
  try {
    return JSON.parse(localStorage.getItem('spiritual-tracker') || '{}');
  } catch (e) {
    return {};
  }
}
function saveData(data) {
  localStorage.setItem('spiritual-tracker', JSON.stringify(data));
}

function calcTotal(data, fieldId) {
  let total = 0;
  Object.values(data).forEach(day => {
    if (day[fieldId]) {
      total += day[fieldId].reduce((s, e) => s + (e.count || 0), 0);
    }
  });
  return total;
}
function calcDayFieldTotal(entries) {
  if (!entries) return 0;
  return entries.reduce((s, e) => s + (e.count || 0), 0);
}

// ====== MAIN PAGE RENDER ======
function buildMainPage() {
  try {
    // Set today's date
    document.getElementById('today-date').textContent = formatDate(todayStr());
    // Render fields
    const data = loadData();
    const fc = document.getElementById('fields-container');
    let html = '';
    FIELDS.forEach(f => {
      html += `
        <div class="field-card" style="--accent:${f.color}">
          <div class="field-header">
            <span class="field-name">${f.icon} ${f.name}</span>
          </div>
          <div class="field-body">
            <div class="input-row">
              <input id="inp-${f.id}" type="number" min="1" placeholder="Count" inputmode="numeric" autocomplete="off" />
              <button class="add-btn" onclick="addCount('${f.id}')">Add</button>
            </div>
          </div>
        </div>`;
    });
    fc.innerHTML = html;
    buildTotals(data);
  } catch (e) {
    showJsError('Main page render failed: ' + e);
  }
}

function showJsError(msg) {
  var el = document.getElementById('js-error');
  if (el) {
    el.style.display = 'block';
    el.textContent = 'Error: ' + msg;
  }
}

function buildTotals(data) {
  try {
    const tg = document.getElementById('totals-grid');
    if (!tg) {
      console.error('Totals grid not found!');
      return;
    }
    let totalsHTML = '';
    FIELDS.forEach(f => {
      const total = calcTotal(data, f.id);
      totalsHTML += `
        <div class="total-item">
          <div class="t-name">${f.name}</div>
          <div class="t-val" style="color:${f.color}" id="total-${f.id}">${total.toLocaleString('en-US')}</div>
        </div>`;
    });
    tg.innerHTML = totalsHTML;
    console.log('Totals updated');
  } catch (error) {
    console.error('Error building totals:', error);
  }
}

function addCount(fieldId) {
  const inp = document.getElementById(`inp-${fieldId}`);
  const val = parseInt(inp.value, 10);
  if (!val || val <= 0) { 
    showToast('⚠️ Please enter a valid number'); 
    inp.focus();
    return; 
  }
  const data = loadData();
  const today = todayStr();
  if (!data[today]) data[today] = {};
  if (!data[today][fieldId]) data[today][fieldId] = [];
  data[today][fieldId].push({ time: nowTime(), count: val });
  saveData(data);
  inp.value = '';
  inp.focus();
  // Haptic feedback
  if ('vibrate' in navigator) {
    navigator.vibrate(50);
  }
  showToast(`✅ ${val.toLocaleString('en-US')} added`);
  buildMainPage();
}

// ====== HISTORY ======
function openHistory() {
  document.getElementById('history-overlay').classList.add('open');
  renderHistory();
}
function closeHistory() {
  document.getElementById('history-overlay').classList.remove('open');
}
function renderHistory() {
  const data = loadData();
  const sortedDates = Object.keys(data).sort((a, b) => b.localeCompare(a));
  const hc = document.getElementById('hist-content');
  if (!sortedDates.length) {
    hc.innerHTML = '<div class="empty-msg">📭 No entries yet</div>';
    return;
  }
  hc.innerHTML = sortedDates.map((dt, di) => {
    const dayData = data[dt];
    const dayTotal = FIELDS.reduce((s, f) => s + calcDayFieldTotal(dayData[f.id]), 0);
    const fieldSections = FIELDS.map(f => {
      const entries = dayData[f.id] || [];
      if (!entries.length) return '';
      const entryRows = entries.map(e => `
        <div class="entry-item">
          <span class="e-time">🕐 ${e.time}</span>
          <span class="e-num" style="color:${f.color}">${e.count.toLocaleString('en-US')}</span>
        </div>`).join('');
      const dayFieldTotal = calcDayFieldTotal(entries);
      return `
        <div class="field-section">
          <div class="field-sec-header">
            <span style="color:${f.color};font-size:13px;">${f.name}</span>
            <span style="font-size:11px;color:#aaa">${entries.length} times</span>
          </div>
          ${entryRows}
          ${entries.length > 1 ? `
            <div class="day-field-total">
              <span class="dt-label">= Total for this field</span>
              <span class="dt-val" style="color:${f.color}">${dayFieldTotal.toLocaleString('en-US')}</span>
            </div>` : ''}
        </div>`;
    }).join('');
    return `
      <div class="date-group">
        <div class="date-group-header">
          <span>📅 ${formatDate(dt)}</span>
          <span style="font-size:12px;opacity:.85">Total: ${dayTotal.toLocaleString('en-US')}</span>
        </div>
        <div>
          ${fieldSections || '<div style="color:#aaa;padding:12px 16px;font-size:13px">No entries</div>'}
        </div>
      </div>`;
  }).join('');
}

// ====== UTILITIES ======
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// Prevent zoom on double tap
let lastTouchEnd = 0;
document.addEventListener('touchend', function (event) {
  const now = (new Date()).getTime();
  if (now - lastTouchEnd <= 300) {
    event.preventDefault();
  }
  lastTouchEnd = now;
}, false);

// ====== INITIALIZATION ======
function init() {
  try {
    // ...existing code...
    buildMainPage();
    // Auto-focus first input (only on desktop)
    setTimeout(() => {
      const firstInput = document.querySelector('input[type="number"]');
      if (firstInput && window.innerWidth > 768) {
        firstInput.focus();
      }
    }, 500);
  } catch (e) {
    showJsError('Initialization failed: ' + e);
  }
}

// Robust single initialization
document.addEventListener('DOMContentLoaded', init);
</script>

</script>
