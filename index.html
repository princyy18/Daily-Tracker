<script>
// ====== PENDING TRACKER ======
function getPendingData() {
  try {
    return JSON.parse(localStorage.getItem('pending-tracker') || '[]');
  } catch (e) {
    return [];
  }
}
function savePendingData(data) {
  localStorage.setItem('pending-tracker', JSON.stringify(data));
}

function addPendingEntry(date, fieldId, count) {
  const data = getPendingData();
  data.push({ date, fieldId, count });
  savePendingData(data);
}

function renderPendingTable() {
  const data = getPendingData();
  if (!data.length) {
    document.getElementById('pending-table-container').innerHTML = '<div style="color:#aaa;text-align:center;padding:18px;">No pending entries yet</div>';
    return;
  }
  // Sort by date descending
  data.sort((a, b) => b.date.localeCompare(a.date));
  let html = '<table style="width:100%;border-collapse:collapse;font-size:15px;">';
  html += '<thead><tr style="background:#f5f0ff;"><th style="padding:8px 4px;text-align:left;">Date</th><th style="padding:8px 4px;text-align:left;">Field</th><th style="padding:8px 4px;text-align:right;">Pending</th></tr></thead><tbody>';
  data.forEach(entry => {
    const field = FIELDS.find(f => f.id === entry.fieldId);
    html += `<tr><td style="padding:6px 4px;">${formatDate(entry.date)}</td><td style="padding:6px 4px;">${field ? field.name : entry.fieldId}</td><td style="padding:6px 4px;text-align:right;">${entry.count}</td></tr>`;
  });
  html += '</tbody>';
  // Totals
  const totals = {};
  FIELDS.forEach(f => { totals[f.id] = 0; });
  data.forEach(entry => { if (totals[entry.fieldId] !== undefined) totals[entry.fieldId] += entry.count; });
  html += '<tfoot><tr style="background:#ede9ff;font-weight:700;"><td colspan="2" style="padding:8px 4px;">Total (per field)</td><td style="padding:8px 4px;text-align:right;"><ul style="list-style:none;padding:0;margin:0;">';
  FIELDS.forEach(f => { html += `<li style="color:${f.color};font-size:15px;">${f.name}: ${totals[f.id]}</li>`; });
  html += '</ul></td></tr></tfoot>';
  html += '</table>';
  document.getElementById('pending-table-container').innerHTML = html;
}

function setupPendingForm() {
  const form = document.getElementById('pending-form');
  form.addEventListener('submit', function(e) {
    e.preventDefault();
    const count = parseInt(document.getElementById('pending-count').value, 10);
    const fieldId = document.getElementById('pending-field').value;
    if (!count || count <= 0) {
      showToast('⚠️ Please enter a valid pending count');
      return;
    }
    addPendingEntry(todayStr(), fieldId, count);
    document.getElementById('pending-count').value = '';
    renderPendingTable();
    showToast('Pending count added');
  });
}
// Setup pending tracker on page load
document.addEventListener('DOMContentLoaded', function() {
  setupPendingForm();
  renderPendingTable();
});
</script>

<script>

// ====== DATA & FIELDS ======
const FIELDS = [
  { id: 'archavatar-stotra', name: 'આર્ચાવતાર સ્તોત્ર', color: '#6c3dc7', icon: '📜' },
  { id: 'vandu-path', name: 'વંદુ પાઠ', color: '#a855a0', icon: '📖' },
  { id: 'janmangal-path', name: 'જનમંગલ પાઠ', color: '#388e3c', icon: '📿' },
  { id: 'namjap', name: 'નામજાપ', color: '#1976d2', icon: '🔱' }
];

function todayStr() {
  const d = new Date();
  return d.toLocaleDateString('en-CA', { timeZone: 'Asia/Kolkata' });
}
function nowTime() {
  const d = new Date();
  return d.toLocaleTimeString('en-US', { 
    hour: '2-digit', 
    minute: '2-digit',
    timeZone: 'Asia/Kolkata'
  });
}
function formatDate(str) {
  const d = new Date(str + 'T00:00:00');
  return d.toLocaleDateString('en-US', { 
    day: 'numeric', 
    month: 'long', 
    year: 'numeric',
    timeZone: 'Asia/Kolkata'
  });
}

function loadData() {
  try {
    return JSON.parse(localStorage.getItem('spiritual-tracker') || '{}');
  } catch (e) {
    return {};
  }
}
function saveData(data) {
  localStorage.setItem('spiritual-tracker', JSON.stringify(data));
}

function calcTotal(data, fieldId) {
  let total = 0;
  Object.values(data).forEach(day => {
    if (day[fieldId]) {
      total += day[fieldId].reduce((s, e) => s + (e.count || 0), 0);
    }
  });
  return total;
}
function calcDayFieldTotal(entries) {
  if (!entries) return 0;
  return entries.reduce((s, e) => s + (e.count || 0), 0);
}

// ====== MAIN PAGE RENDER ======
function buildMainPage() {
  try {
    // Set today's date
    document.getElementById('today-date').textContent = formatDate(todayStr());
    // Render fields
    const data = loadData();
    const fc = document.getElementById('fields-container');
    let html = '';
    FIELDS.forEach(f => {
      html += `
        <div class="field-card" style="--accent:${f.color}">
          <div class="field-header">
            <span class="field-name">${f.icon} ${f.name}</span>
          </div>
          <div class="field-body">
            <div class="input-row">
              <input id="inp-${f.id}" type="number" min="1" placeholder="Count" inputmode="numeric" autocomplete="off" />
              <button class="add-btn" onclick="addCount('${f.id}')">Add</button>
            </div>
          </div>
        </div>`;
    });
    fc.innerHTML = html;
    buildTotals(data);
  } catch (e) {
    showJsError('Main page render failed: ' + e);
  }
}

function showJsError(msg) {
  var el = document.getElementById('js-error');
  if (el) {
    el.style.display = 'block';
    el.textContent = 'Error: ' + msg;
  }
}

function buildTotals(data) {
  try {
    const tg = document.getElementById('totals-grid');
    if (!tg) {
      console.error('Totals grid not found!');
      return;
    }
    let totalsHTML = '';
    FIELDS.forEach(f => {
      const total = calcTotal(data, f.id);
      totalsHTML += `
        <div class="total-item">
          <div class="t-name">${f.name}</div>
          <div class="t-val" style="color:${f.color}" id="total-${f.id}">${total.toLocaleString('en-US')}</div>
        </div>`;
    });
    tg.innerHTML = totalsHTML;
    console.log('Totals updated');
  } catch (error) {
    console.error('Error building totals:', error);
  }
}

function addCount(fieldId) {
  const inp = document.getElementById(`inp-${fieldId}`);
  const val = parseInt(inp.value, 10);
  if (!val || val <= 0) { 
    showToast('⚠️ Please enter a valid number'); 
    inp.focus();
    return; 
  }
  // Remove from pending if available
  let pending = getPendingData();
  let toRemove = val;
  let changed = false;
  // Remove from oldest pending first
  for (let i = 0; i < pending.length && toRemove > 0; i++) {
    if (pending[i].fieldId === fieldId && pending[i].count > 0) {
      if (pending[i].count > toRemove) {
        pending[i].count -= toRemove;
        toRemove = 0;
        changed = true;
      } else {
        toRemove -= pending[i].count;
        pending[i].count = 0;
        changed = true;
      }
    }
  }
  // Remove zeroed out pending
  if (changed) {
    pending = pending.filter(e => e.count > 0);
    savePendingData(pending);
    renderPendingTable && renderPendingTable();
  }
  // Add to main data
  const data = loadData();
  const today = todayStr();
  if (!data[today]) data[today] = {};
  if (!data[today][fieldId]) data[today][fieldId] = [];
  data[today][fieldId].push({ time: nowTime(), count: val });
  saveData(data);
  inp.value = '';
  inp.focus();
  // Haptic feedback
  if ('vibrate' in navigator) {
    navigator.vibrate(50);
  }
  showToast(`✅ ${val.toLocaleString('en-US')} added`);
  buildMainPage();
}

// ====== HISTORY ======
function openHistory() {
  document.getElementById('history-overlay').classList.add('open');
  renderHistory();
}
function closeHistory() {
  document.getElementById('history-overlay').classList.remove('open');
}
function renderHistory() {
  const data = loadData();
  const sortedDates = Object.keys(data).sort((a, b) => b.localeCompare(a));
  const hc = document.getElementById('hist-content');
  if (!sortedDates.length) {
    hc.innerHTML = '<div class="empty-msg">📭 No entries yet</div>';
    return;
  }
  hc.innerHTML = sortedDates.map((dt, di) => {
    const dayData = data[dt];
    const dayTotal = FIELDS.reduce((s, f) => s + calcDayFieldTotal(dayData[f.id]), 0);
    const fieldSections = FIELDS.map(f => {
      const entries = dayData[f.id] || [];
      if (!entries.length) return '';
      const entryRows = entries.map(e => `
        <div class="entry-item">
          <span class="e-time">🕐 ${e.time}</span>
          <span class="e-num" style="color:${f.color}">${e.count.toLocaleString('en-US')}</span>
        </div>`).join('');
      const dayFieldTotal = calcDayFieldTotal(entries);
      return `
        <div class="field-section">
          <div class="field-sec-header">
            <span style="color:${f.color};font-size:13px;">${f.name}</span>
            <span style="font-size:11px;color:#aaa">${entries.length} times</span>
          </div>
          ${entryRows}
          ${entries.length > 1 ? `
            <div class="day-field-total">
              <span class="dt-label">= Total for this field</span>
              <span class="dt-val" style="color:${f.color}">${dayFieldTotal.toLocaleString('en-US')}</span>
            </div>` : ''}
        </div>`;
    }).join('');
    return `
      <div class="date-group">
        <div class="date-group-header">
          <span>📅 ${formatDate(dt)}</span>
          <span style="font-size:12px;opacity:.85">Total: ${dayTotal.toLocaleString('en-US')}</span>
        </div>
        <div>
          ${fieldSections || '<div style="color:#aaa;padding:12px 16px;font-size:13px">No entries</div>'}
        </div>
      </div>`;
  }).join('');
}

// ====== UTILITIES ======
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// Prevent zoom on double tap
let lastTouchEnd = 0;
document.addEventListener('touchend', function (event) {
  const now = (new Date()).getTime();
  if (now - lastTouchEnd <= 300) {
    event.preventDefault();
  }
  lastTouchEnd = now;
}, false);

// ====== INITIALIZATION ======
function init() {
  try {
    // ...existing code...
    buildMainPage();
    // Auto-focus first input (only on desktop)
    setTimeout(() => {
      const firstInput = document.querySelector('input[type="number"]');
      if (firstInput && window.innerWidth > 768) {
        firstInput.focus();
      }
    }, 500);
  } catch (e) {
    showJsError('Initialization failed: ' + e);
  }
}

// Robust single initialization
document.addEventListener('DOMContentLoaded', init);
</script>

</script>
